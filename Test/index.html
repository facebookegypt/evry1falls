<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login with Facebook to access your profile and view personalized stats.">
    <meta name="google-site-verification" content="wLd5RpntOn13Q149-gVDIb6YdlCHw_R-PLr0f6BGJdw" />
    <title>Neumorphism Facebook Login</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #e0e0e0;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background-color: #e0e0e0;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 8px 8px 15px rgba(0, 0, 0, 0.1), -8px -8px 15px rgba(255, 255, 255, 0.7);
            text-align: center;
            max-width: 350px;
            width: 100%;
            position: relative;
        }

        .container img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1), -4px -4px 10px rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            cursor: pointer;
        }

        .container h1 {
            font-size: 1.5em;
            margin: 10px 0;
        }

        .container p {
            font-size: 1em;
            margin: 5px 0;
            color: #777;
        }

        .container button {
            background-color: #e0e0e0;
            border: none;
            padding: 12px 20px;
            font-size: 1em;
            border-radius: 20px;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1), -4px -4px 10px rgba(255, 255, 255, 0.7);
            cursor: pointer;
            margin: 10px;
            transition: box-shadow 0.3s ease;
        }

        .container button:hover {
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1), -2px -2px 5px rgba(255, 255, 255, 0.7);
        }

        .stats {
            margin-top: 20px;
        }

        .stats p {
            font-size: 0.9em;
            color: #333;
        }

        .logout-btn {
            position: absolute;
            right: 10px;
            top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img id="profile-pic" src="img/looking-good.gif" alt="Profile Picture">
        <h1 id="user-name">Welcome!</h1>
        <p id="user-info"></p>
        <button id="fb-login-btn">Login with Facebook</button>
        <button id="fb-logout-btn" class="logout-btn" style="display: none;">Logout</button>
    </div>

    <script type="module">
        // Import Firebase modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, FacebookAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdDxwmuS9w0VnfYzLL2ptYBI4GYUWuZqQ",
            authDomain: "git-hub-test-34e5a.firebaseapp.com",
            projectId: "git-hub-test-34e5a",
            storageBucket: "git-hub-test-34e5a.appspot.com",
            messagingSenderId: "824616741271",
            appId: "1:824616741271:web:7d068b5de85ba781757cd2",
            measurementId: "G-TV39YCR646"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.fbAsyncInit = function() {
            FB.init({
                appId: '1238020140566279',
                cookie: true,
                xfbml: true,
                version: 'v20.0'
            });

            FB.getLoginStatus(function(response) {
                statusChangeCallback(response);
            });
        };

        (function(d, s, id) {
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            js = d.createElement(s);
            js.id = id;
            js.src = "https://connect.facebook.net/en_US/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));

        function statusChangeCallback(response) {
            if (response.status === 'connected') {
                document.getElementById('fb-login-btn').style.display = 'none';
                document.getElementById('fb-logout-btn').style.display = 'inline';
                FB.api('/me', { fields: 'name,birthday,age_range,friends,picture' }, function(response) {
                    const birthday = new Date(response.birthday);
                    const today = new Date();
                    const age = today.getFullYear() - birthday.getFullYear();
                    const months = today.getMonth() - birthday.getMonth();
                    const days = today.getDate() - birthday.getDate();

                    const correctAge = {
                        years: age,
                        months: months < 0 ? months + 12 : months,
                        days: days < 0 ? days + 30 : days
                    };

                    document.getElementById('user-name').textContent = `Welcome, ${response.name}!`;
                    document.getElementById('user-info').textContent = `You are ${correctAge.years} years, ${correctAge.months} months, ${correctAge.days} days old now. You have ${response.friends.summary.total_count} friend(s).`;
                    document.getElementById('profile-pic').src = response.picture.data.url;
                    document.getElementById('profile-pic').onclick = () => window.open(`https://www.facebook.com/${response.id}`, '_blank');

                    // Store user data in Firestore
                    setDoc(doc(db, "users", response.id), {
                        name: response.name,
                        picture: response.picture.data.url,
                        age: correctAge.years
                    });
                });
            } else {
                document.getElementById('fb-login-btn').style.display = 'inline';
                document.getElementById('fb-logout-btn').style.display = 'none';
            }
        }

        document.getElementById('fb-login-btn').onclick = function() {
            signInWithPopup(auth, new FacebookAuthProvider()).then((result) => {
                const user = result.user;
                statusChangeCallback(user);
            }).catch((error) => {
                console.error(error);
            });
        };

        document.getElementById('fb-logout-btn').onclick = function() {
            signOut(auth).then(() => {
                FB.logout();
                document.getElementById('profile-pic').src = 'img/looking-good.gif';
                document.getElementById('user-name').textContent = 'Welcome!';
                document.getElementById('user-info').textContent = '';
            }).catch((error) => {
                console.error(error);
            });
        };
    </script>
</body>
</html>
