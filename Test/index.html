<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Firebase Authentication and Database Integration">
    <meta name="google-site-verification" content="wLd5RpntOn13Q149-gVDIb6YdlCHw_R-PLr0f6BGJdw">
    <title>Firebase Integration</title>
    
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <!-- Firebase Authentication -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <!-- Firebase Firestore (for database) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to right, #00aaff, #00ffcc); /* Gradient background for non-logged-in state */
        }

        .container {
            text-align: center;
            background: #e0e0e0;
            border-radius: 15px;
            box-shadow: 8px 8px 15px #bdbdbd, -8px -8px 15px #ffffff;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 1; /* Ensure container is above shapes */
        }

        #profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }

        #login-btn, #logout-btn {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            box-shadow: inset 4px 4px 6px #bdbdbd, inset -4px -4px 6px #ffffff;
            background-color: #4267B2; /* Facebook blue */
            transition: background-color 0.3s;
        }

        #login-btn:hover {
            background-color: #365899; /* Darker blue on hover */
        }

        #logout-btn {
            background-color: #f28d6c; /* Logout button color */
        }

        #logout-btn:hover {
            background-color: #e06c3c; /* Darker color on hover */
        }

        /* Dynamic background shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            border: 2px solid;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            pointer-events: none; /* Prevent shapes from interfering with interactions */
        }

        .shape.circle {
            border-color: rgba(255, 0, 0, 0.8); /* Red outline */
        }

        .shape.square {
            border-color: rgba(0, 255, 0, 0.8); /* Green outline */
            border-radius: 0;
        }

        .shape.rectangle {
            border-color: rgba(0, 0, 255, 0.8); /* Blue outline */
            border-radius: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <img id="profile-pic" src="img/looking-good.gif" alt="Profile Picture">
        <h2 id="user-info">Please sign in</h2>
        <button id="login-btn" onclick="login()">Login with Facebook</button>
        <button id="logout-btn" onclick="logout()" style="display:none;">Logout</button>
    </div>

    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBdDxwmuS9w0VnfYzLL2ptYBI4GYUWuZqQ",
            authDomain: "git-hub-test-34e5a.firebaseapp.com",
            databaseURL: "https://git-hub-test-34e5a-default-rtdb.firebaseio.com",
            projectId: "git-hub-test-34e5a",
            storageBucket: "git-hub-test-34e5a.appspot.com",
            messagingSenderId: "824616741271",
            appId: "1:824616741271:web:7d068b5de85ba781757cd2",
            measurementId: "G-TV39YCR646"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Set up Firebase Authentication
        const provider = new firebase.auth.FacebookAuthProvider();

        function login() {
            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    // User is signed in.
                    console.log('User signed in:', result.user);
                    document.getElementById('user-info').textContent = `Welcome, ${result.user.displayName}`;
                    document.getElementById('profile-pic').src = result.user.photoURL;
                    document.getElementById('login-btn').style.display = 'none';
                    document.getElementById('logout-btn').style.display = 'block';
                    updateBackground(true);
                })
                .catch((error) => {
                    console.error('Error during sign-in:', error);
                });
        }

        function logout() {
            firebase.auth().signOut().then(() => {
                console.log('User signed out');
                document.getElementById('user-info').textContent = 'Please sign in';
                document.getElementById('profile-pic').src = 'img/looking-good.gif';
                document.getElementById('login-btn').style.display = 'block';
                document.getElementById('logout-btn').style.display = 'none';
                updateBackground(false);
            }).catch((error) => {
                console.error('Error during sign-out:', error);
            });
        }

        // Listen to authentication state changes
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                // User is signed in
                document.getElementById('user-info').textContent = `Welcome, ${user.displayName}`;
                document.getElementById('profile-pic').src = user.photoURL;
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'block';
                updateBackground(true);
            } else {
                // User is signed out
                document.getElementById('user-info').textContent = 'Please sign in';
                document.getElementById('profile-pic').src = 'img/looking-good.gif';
                document.getElementById('login-btn').style.display = 'block';
                document.getElementById('logout-btn').style.display = 'none';
                updateBackground(false);
            }
        });

        function updateBackground(isLoggedIn) {
            const body = document.body;
            body.innerHTML = ''; // Clear existing shapes

            if (isLoggedIn) {
                // Add background shapes if logged in
                for (let i = 0; i < 42; i++) {
                    const shape = document.createElement('div');
                    shape.className = 'shape';
                    
                    const size = Math.random() * 50 + 50; // Random size between 50px and 100px
                    shape.style.width = `${size}px`;
                    shape.style.height = `${size}px`;
                    shape.style.top = `${Math.random() * 100}vh`;
                    shape.style.left = `${Math.random() * 100}vw`;

                    const shapeType = Math.random();
                    if (shapeType < 0.33) {
                        shape.classList.add('circle');
                    } else if (shapeType < 0.66) {
                        shape.classList.add('square');
                    } else {
                        shape.classList.add('rectangle');
                    }
                    
                    body.appendChild(shape);
                }
            } else {
                // Set gradient background if not logged in
                body.style.background = 'linear-gradient(to right, #00aaff, #00ffcc)';
            }
        }
    </script>
</body>
</html>
