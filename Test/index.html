<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login with Facebook to access your profile and use our application. Enjoy a simple and engaging app experience with your favorite features.">
    <title>Facebook Login</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #2c3e50; /* Default background */
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Gradient background for not logged-in users */
        .gradient-background {
            background: linear-gradient(135deg, #3498db, #9b59b6); /* Blue to purple gradient */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Background shapes for logged-in users */
        .background-shapes {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .background-shapes .shape {
            position: absolute;
            border: 3px solid;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.6);
            pointer-events: none;
        }

        .background-shapes .circle {
            border-radius: 50%;
        }

        .background-shapes .square,
        .background-shapes .rectangle {
            border-radius: 0;
        }

        .background-shapes .oval {
            border-radius: 50%;
        }

        /* Shapes position & color */
        .background-shapes .circle:nth-child(1) { width: 100px; height: 100px; top: 5%; left: 10%; border-color: #e74c3c; }
        .background-shapes .circle:nth-child(2) { width: 90px; height: 90px; top: 20%; left: 70%; border-color: #3498db; }
        .background-shapes .circle:nth-child(3) { width: 110px; height: 110px; top: 40%; left: 30%; border-color: #2ecc71; }
        /* Add more shapes as needed from previous code */

        /* Container Styling */
        .container {
            background-color: #34495e;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            max-width: 300px;
            width: 100%;
        }

        .container img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ecf0f1;
            margin-bottom: 20px;
        }

        .container h1 {
            font-size: 1.5em;
            margin: 10px 0;
        }

        .container button {
            background-color: #3498db;
            border: none;
            color: #fff;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            transition: background-color 0.3s;
        }

        .container button:hover {
            background-color: #2980b9;
        }

        .container button:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
        }

        .container .profile-pic {
            border: 3px solid #ecf0f1;
        }
    </style>
    <meta name="google-site-verification" content="wLd5RpntOn13Q149-gVDIb6YdlCHw_R-PLr0f6BGJdw" />
</head>
<body>
    <div class="gradient-background" id="background-gradient"></div>
    <div class="background-shapes" id="background-shapes">
        <!-- Shapes will appear when the user is logged in -->
        <div class="shape circle"></div>
        <div class="shape circle"></div>
        <div class="shape circle"></div>
        <!-- Add more shapes as needed from previous code -->
    </div>

    <div class="container">
        <img id="profile-pic" class="profile-pic" src="" alt="Profile Picture">
        <h1 id="user-name">Welcome to your application</h1>
        <button id="fb-login-btn">Login with Facebook</button>
        <button id="fb-logout-btn" style="display: none;">Logout</button>
    </div>

    <script>
        window.fbAsyncInit = function() {
            FB.init({
                appId      : '1238020140566279', // Your Facebook App ID
                cookie     : true,
                xfbml      : true,
                version    : 'v20.0'
            });

            FB.getLoginStatus(function(response) {
                statusChangeCallback(response);
            });
        };

        (function(d, s, id){
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) {return;}
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/en_US/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));

        function statusChangeCallback(response) {
            if (response.status === 'connected') {
                document.getElementById('fb-login-btn').style.display = 'none';
                document.getElementById('fb-logout-btn').style.display = 'inline';
                FB.api('/me', {fields: 'name,picture'}, function(response) {
                    document.getElementById('user-name').textContent = 'Welcome, ' + response.name;
                    document.getElementById('profile-pic').src = response.picture.data.url;
                });
                // Show shapes, hide gradient
                document.getElementById('background-shapes').style.display = 'block';
                document.getElementById('background-gradient').style.display = 'none';
            } else {
                document.getElementById('fb-login-btn').style.display = 'inline';
                document.getElementById('fb-logout-btn').style.display = 'none';
                // Show gradient, hide shapes
                document.getElementById('background-shapes').style.display = 'none';
                document.getElementById('background-gradient').style.display = 'block';
            }
        }

        document.getElementById('fb-login-btn').addEventListener('click', function() {
            FB.login(function(response) {
                statusChangeCallback(response);
            }, {scope: 'public_profile'});
        });

        document.getElementById('fb-logout-btn').addEventListener('click', function() {
            FB.logout(function(response) {
                statusChangeCallback(response);
            });
        });
    </script>
</body>
</html>
