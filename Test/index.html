<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Facebook Login</title><link rel="icon" href="favicon.ico" type="image/x-icon"><style>body{font-family:Arial,sans-serif;background-color:#f0f4f8;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}.container{background:white;border-radius:10px;padding:20px;box-shadow:0px 4px 12px rgba(0,0,0,.1);text-align:center;max-width:360px;width:100%}.profile{margin-bottom:20px}.profile img{border-radius:50%;box-shadow:0px 4px 8px rgba(0,0,0,.2);width:80px;height:80px;margin-bottom:10px}.profile h2{font-size:1.2rem;color:#555;margin:0}.button-container{display:flex;flex-direction:column;align-items:center}.button-container button{padding:10px 20px;margin:5px;border:none;border-radius:5px;font-size:1rem;cursor:pointer;transition:background .3s ease;width:100%}.button-container #login-btn{background-color:#4267b2;color:white}.button-container #login-btn:hover{background-color:#365899}.button-container #logout-btn{background-color:#f44336;color:white;display:none}.button-container #logout-btn:hover{background-color:#d32f2f}@media (max-width:480px){.container{padding:15px}.profile img{width:70px;height:70px}.profile h2{font-size:1rem}}@media (max-width:320px){.container{padding:10px}.profile img{width:60px;height:60px}.profile h2{font-size:.9rem}}</style></head><body><div class="container"><div id="fb-root"></div><script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script><script>window.fbAsyncInit=function(){FB.init({appId:'1238020140566279',cookie:true,xfbml:true,version:'v20.0'});FB.getLoginStatus(function(response){statusChangeCallback(response)})};function statusChangeCallback(response){if(response.status==='connected'){FB.api('/me',{fields:'name,picture'},function(response){document.getElementById('username').innerHTML=response.name;document.getElementById('profile-pic').src=response.picture.data.url});document.getElementById('login-btn').style.display='none';document.getElementById('logout-btn').style.display='block'}else{document.getElementById('login-btn').style.display='block';document.getElementById('logout-btn').style.display='none'}}function login(){FB.login(function(response){if(response.authResponse){FB.api('/me',{fields:'name,picture'},function(response){document.getElementById('username').innerHTML=response.name;document.getElementById('profile-pic').src=response.picture.data.url});document.getElementById('login-btn').style.display='none';document.getElementById('logout-btn').style.display='block'}},{scope:'public_profile,email'})}function logout(){FB.logout(function(response){document.getElementById('username').innerHTML='';document.getElementById('profile-pic').src='';document.getElementById('login-btn').style.display='block';document.getElementById('logout-btn').style.display='none'})}</script><div class="profile"><img id="profile-pic" src="" alt="Profile Picture"><h2 id="username"></h2></div><div class="button-container"><button id="login-btn" onclick="login()">Login with Facebook</button><button id="logout-btn" onclick="logout()">Logout</button></div></div></body></html>
