        body {
            font-family: 'Roboto', sans-serif;
            background-color: #2c3e50; /* Dark background for contrast */
            color: #ecf0f1; /* Light text color */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .background-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .background-shapes .shape {
            position: absolute;
            box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.6); /* Enhanced shadow for a 3D effect */
            border: 3px solid;
            pointer-events: none;
        }

        .background-shapes .circle {
            border-radius: 50%;
        }

        .background-shapes .square {
            border-radius: 0;
        }

        .background-shapes .rectangle {
            border-radius: 0;
        }

        .background-shapes .oval {
            border-radius: 50%;
        }

        /* Define shape positions and colors */
        .background-shapes .circle:nth-child(1) { width: 100px; height: 100px; top: 5%; left: 10%; border-color: #e74c3c; }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8); /* Slightly translucent background for contrast */
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
        }

        .container img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        .container button {
            background-color: #3498db;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .container button:hover {
            background-color: #2980b9;
        }

        .container h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

    <meta name="google-site-verification" content="wLd5RpntOn13Q149-gVDIb6YdlCHw_R-PLr0f6BGJdw" />

<body>
    <div class="background-shapes">
        <!-- Shapes are dynamically created here -->
    </div>
    <div class="container">
        <img id="profile-pic" src="" alt="Profile Picture">
        <h1 id="welcome-message">Welcome to Your Application</h1>
        <button id="fb-login-btn">Login with Facebook</button>
        <button id="fb-logout-btn" style="display:none;">Logout</button>
    </div>
    <script>
        window.fbAsyncInit = function() {
            FB.init({
                appId: '1238020140566279',
                cookie: true,
                xfbml: true,
                version: 'v20.0'
            });

            FB.getLoginStatus(function(response) {
                if (response.status === 'connected') {
                    document.getElementById('fb-login-btn').style.display = 'none';
                    document.getElementById('fb-logout-btn').style.display = 'inline-block';
                    FB.api('/me', {fields: 'name,picture'}, function(response) {
                        document.getElementById('profile-pic').src = response.picture.data.url;
                        document.getElementById('welcome-message').innerText = 'Welcome, ' + response.name;
                    });
                } else {
                    document.getElementById('fb-login-btn').style.display = 'inline-block';
                    document.getElementById('fb-logout-btn').style.display = 'none';
                }
            });
        };

        (function(d, s, id) {
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/en_US/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));

        document.getElementById('fb-login-btn').addEventListener('click', function() {
            FB.login(function(response) {
                if (response.status === 'connected') {
                    document.getElementById('fb-login-btn').style.display = 'none';
                    document.getElementById('fb-logout-btn').style.display = 'inline-block';
                    FB.api('/me', {fields: 'name,picture'}, function(response) {
                        document.getElementById('profile-pic').src = response.picture.data.url;
                        document.getElementById('welcome-message').innerText = 'Welcome, ' + response.name;
                    });
                }
            });
        });

        document.getElementById('fb-logout-btn').addEventListener('click', function() {
            FB.logout(function(response) {
                document.getElementById('fb-login-btn').style.display = 'inline-block';
                document.getElementById('fb-logout-btn').style.display = 'none';
                document.getElementById('profile-pic').src = '';
                document.getElementById('welcome-message').innerText = 'Welcome to Your Application';
            });
        });
    </script>
</body>
</html>
