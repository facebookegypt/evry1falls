<!DOCTYPE html>
<html>
<head>
<title>Facebook Login JavaScript Example</title>
<meta charset="UTF-8">
</head>
<body>
<div id="fb-root"></div>
<script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
<script>
  window.fbAsyncInit = function() {
    FB.init({
      appId      : '1238020140566279', 
      cookie     : true,
      xfbml      : true,  
      version    : 'v20.0' 
    });

    FB.getLoginStatus(function(response) {
      statusChangeCallback(response);
    });
  };

  // Check the user's login status
  function statusChangeCallback(response) {
    if (response.status === 'connected') {
      // User is logged in, hide the login button and show the logout button
      FB.api('/me', {fields: 'name, picture'}, function(response) {
        document.getElementById('username').innerHTML = response.name;
        document.getElementById('profile-pic').src = response.picture.data.url;
      });
      document.getElementById('login-btn').style.display = 'none';
      document.getElementById('logout-btn').style.display = 'block';
    } else {
      // User is not logged in, show the login button and hide the logout button
      document.getElementById('login-btn').style.display = 'block';
      document.getElementById('logout-btn').style.display = 'none';
    }
  }

  // Facebook login function
  function login() {
    FB.login(function(response) {
      if (response.authResponse) {
        FB.api('/me', {fields: 'name, picture'}, function(response) {
          document.getElementById('username').innerHTML = response.name;
          document.getElementById('profile-pic').src = response.picture.data.url;
        });
        document.getElementById('login-btn').style.display = 'none';
        document.getElementById('logout-btn').style.display = 'block';
      }
    }, {scope: 'public_profile,email'});
  }

  // Facebook logout function
  function logout() {
    FB.logout(function(response) {
      document.getElementById('username').innerHTML = '';
      document.getElementById('profile-pic').src = '';
      document.getElementById('login-btn').style.display = 'block';
      document.getElementById('logout-btn').style.display = 'none';
    });
  }
</script>

<!-- HTML Structure -->
<button id="login-btn" onclick="login()">Login with Facebook</button>
<button id="logout-btn" style="display:none;" onclick="logout()">Logout</button>
<div>
  <h2 id="username"></h2>
  <img id="profile-pic" />
</div></body>
</html>
