<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login with Facebook to access your profile and view personalized stats.">
    <meta name="google-site-verification" content="wLd5RpntOn13Q149-gVDIb6YdlCHw_R-PLr0f6BGJdw" />
    <title>Neumorphism Facebook Login</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #e0e0e0;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: #e0e0e0;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ccc;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1), -4px -4px 10px rgba(255, 255, 255, 0.7);
            z-index: 1000;
        }

        .container img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }

        .container .welcome-message {
            font-size: 1em;
            color: #333;
            flex-grow: 1;
            margin-left: 10px;
        }

        .container button {
            background-color: #e0e0e0;
            border: none;
            padding: 8px 16px;
            font-size: 1em;
            border-radius: 20px;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1), -4px -4px 10px rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: box-shadow 0.3s ease;
        }

        .container button:hover {
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1), -2px -2px 5px rgba(255, 255, 255, 0.7);
        }

        #fb-login-btn {
            margin: 100px auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container" id="top-container" style="display: none;">
        <img id="profile-pic" src="img/looking-good.gif" alt="Profile Picture" onclick="openProfile()">
        <div class="welcome-message" id="welcome-message">Welcome!</div>
        <button id="fb-logout-btn" style="display: none;">Logout</button>
    </div>

    <button id="fb-login-btn">Login with Facebook</button>

    <script>
        window.fbAsyncInit = function() {
            FB.init({
                appId      : '1238020140566279', // Your Facebook App ID
                cookie     : true,
                xfbml      : true,
                version    : 'v20.0'
            });

            FB.getLoginStatus(function(response) {
                statusChangeCallback(response);
            });
        };

        (function(d, s, id) {
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/en_US/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));

        function statusChangeCallback(response) {
            if (response.status === 'connected') {
                document.getElementById('fb-login-btn').style.display = 'none';
                document.getElementById('top-container').style.display = 'flex';
                document.getElementById('fb-logout-btn').style.display = 'inline';

                FB.api('/me', {fields: 'name,picture,birthday,age_range,friends'}, function(response) {
                    const age = response.age_range.min || 'unknown';
                    const friendsCount = response.friends.summary.total_count || 0;

                    document.getElementById('welcome-message').innerHTML = 
                        `Welcome, ${response.name}, you are ${age} years old now, and you have ${friendsCount} friend(s).`;

                    document.getElementById('profile-pic').src = response.picture.data.url;
                    updateFirestore(response);
                });
            } else {
                document.getElementById('fb-login-btn').style.display = 'inline';
                document.getElementById('top-container').style.display = 'none';
            }
        }

        function openProfile() {
            FB.api('/me', {fields: 'link'}, function(response) {
                window.open(response.link, '_blank');
            });
        }

        document.getElementById('fb-login-btn').onclick = function() {
            FB.login(function(response) {
                statusChangeCallback(response);
            }, {scope: 'public_profile,user_birthday,user_age_range,user_friends'});
        };

        document.getElementById('fb-logout-btn').onclick = function() {
            FB.logout(function(response) {
                statusChangeCallback(response);
                document.getElementById('profile-pic').src = 'img/looking-good.gif';
                document.getElementById('welcome-message').textContent = 'Welcome!';
            });
        };

        function updateFirestore(userInfo) {
            const firebaseConfig = {
                apiKey: "AIzaSyBdDxwmuS9w0VnfYzLL2ptYBI4GYUWuZqQ",
                authDomain: "git-hub-test-34e5a.firebaseapp.com",
                projectId: "git-hub-test-34e5a",
                storageBucket: "git-hub-test-34e5a.appspot.com",
                messagingSenderId: "824616741271",
                appId: "1:824616741271:web:7d068b5de85ba781757cd2"
            };
            firebase.initializeApp(firebaseConfig);

            const db = firebase.firestore();
            db.collection("users").doc(userInfo.id).set({
                name: userInfo.name,
                picture: userInfo.picture.data.url,
                age: userInfo.age_range.min || 'unknown',
                friends: userInfo.friends.summary.total_count || 0
            }).then(function() {
                console.log("User information successfully written to Firestore!");
            }).catch(function(error) {
                console.error("Error writing document: ", error);
            });
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
</body>
</html>
