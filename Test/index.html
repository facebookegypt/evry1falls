        .container {

    <div class="container">
        <div class="logo">Facebook Login</div>
        <div id="fb-root"></div>
        <div class="profile">
            <img id="profile-picture" src="" alt="Profile Picture" style="display:none;">
            <div id="profile-name" style="display:none;"></div>
        </div>
        <div class="btn-container">
            <button id="fb-login-btn" class="btn-login">Login with Facebook</button>
            <button id="fb-logout-btn" class="btn-logout" style="display:none;">Logout</button>
        </div>
        <div class="application">
            <h2>Welcome to Your Application!</h2>
            <!-- Add your application content here -->
        </div>
    </div>
    <script>
        window.fbAsyncInit = function() {
            FB.init({
                appId      : '1238020140566279',
                cookie     : true,
                xfbml      : true,
                version    : 'v20.0'
            });

            FB.getLoginStatus(function(response) {
                statusChangeCallback(response);
            });

            document.getElementById('fb-login-btn').addEventListener('click', function() {
                FB.login(function(response) {
                    statusChangeCallback(response);
                }, {scope: 'public_profile,email'});
            });

            document.getElementById('fb-logout-btn').addEventListener('click', function() {
                FB.logout(function(response) {
                    statusChangeCallback(response);
                });
            });
        };

        function statusChangeCallback(response) {
            if (response.status === 'connected') {
                FB.api('/me', {fields: 'name,picture'}, function(response) {
                    document.getElementById('profile-picture').src = response.picture.data.url;
                    document.getElementById('profile-name').innerText = response.name;
                    document.getElementById('profile-picture').style.display = 'block';
                    document.getElementById('profile-name').style.display = 'block';
                    document.getElementById('fb-login-btn').style.display = 'none';
                    document.getElementById('fb-logout-btn').style.display = 'block';
                });
            } else {
                document.getElementById('profile-picture').style.display = 'none';
                document.getElementById('profile-name').style.display = 'none';
                document.getElementById('fb-login-btn').style.display = 'block';
                document.getElementById('fb-logout-btn').style.display = 'none';
            }
        }

        (function(d, s, id) {
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) {return;}
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/en_US/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));
    </script>
