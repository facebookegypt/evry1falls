<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login with Facebook to access your profile and view personalized stats.">
    <meta name="google-site-verification" content="wLd5RpntOn13Q149-gVDIb6YdlCHw_R-PLr0f6BGJdw" />
    <title>Neumorphism Facebook Login</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #e0e0e0;
            color: #333;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background-color: #e0e0e0;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 8px 8px 15px rgba(0, 0, 0, 0.1), -8px -8px 15px rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: left;
            justify-content: space-between;
            height: 100px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
        }

        .container img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1), -4px -4px 10px rgba(255, 255, 255, 0.7);
            cursor: pointer;
        }

        .container p {
            font-size: 1em;
            color: #333;
            margin-left: 10px;
        }

        .stats p {
            font-size: 1em;
            margin: 0;
            color: #333;
        }

        .main {
            display: flex;
            flex-direction: column;
            justify-content: left;
            align-items: left;
            height: 100vh;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container hidden" id="container">
        <img id="profile-pic" src="img/looking-good.gif" alt="Profile Picture" onclick="openProfile()">
        <p id="user-info">Welcome!</p>
    </div>

    <div class="main" id="login-section">
        <button id="fb-login-btn">Login with Facebook</button>
    </div>

    <script>
        window.fbAsyncInit = function() {
            FB.init({
                appId: '1238020140566279', 
                cookie: true, 
                xfbml: true, 
                version: 'v20.0'
            });

            FB.getLoginStatus(function(response) {
                statusChangeCallback(response);
            });
        };

        (function(d, s, id) {
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/en_US/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));

        function statusChangeCallback(response) {
            if (response.status === 'connected') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('container').classList.remove('hidden');
                FB.api('/me', {fields: 'name,picture,birthday,age_range,friends'}, function(response) {
                    const userName = response.name;
                    const pictureUrl = response.picture.data.url;
                    const birthday = new Date(response.birthday);
                    const today = new Date();
                    const age = calculateAge(birthday, today);
                    const friendsCount = response.friends.summary.total_count;

                    document.getElementById('profile-pic').src = pictureUrl;
                    document.getElementById('user-info').textContent = `Welcome, ${userName}, you are now ${age.years} years, ${age.months} months, and ${age.days} days old. You have ${friendsCount} friend(s).`;

                    // Save to Firestore
                    firebase.firestore().collection('users').doc(response.id).set({
                        name: userName,
                        picture: pictureUrl,
                        age: `${age.years} years, ${age.months} months, ${age.days} days`,
                        friendsCount: friendsCount
                    });
                });
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('container').classList.add('hidden');
            }
        }

        function calculateAge(birthDate, currentDate) {
            let years = currentDate.getFullYear() - birthDate.getFullYear();
            let months = currentDate.getMonth() - birthDate.getMonth();
            let days = currentDate.getDate() - birthDate.getDate();

            if (days < 0) {
                months--;
                days += new Date(currentDate.getFullYear(), currentDate.getMonth(), 0).getDate();
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            return { years, months, days };
        }

        function openProfile() {
            FB.api('/me?fields=link', function(response) {
                window.open(response.link, '_blank');
            });
        }

        document.getElementById('fb-login-btn').onclick = function() {
            FB.login(function(response) {
                statusChangeCallback(response);
            }, {scope: 'public_profile,user_birthday,user_age_range,user_friends'});
        };

    </script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js"></script>

    </script>
</body>
</html>
