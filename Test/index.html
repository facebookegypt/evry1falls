        body {
            font-family: 'Roboto', sans-serif;

            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;

        .background-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .background-shapes .shape {
            position: absolute;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.6); /* Enhanced shadow for a 3D effect */
            border: 3px solid;
            pointer-events: none;
        }

        .background-shapes .circle {
            border-radius: 50%;
        }

        .background-shapes .square {
            border-radius: 0;
        }

        .background-shapes .rectangle {
            border-radius: 0;
        }

        .background-shapes .oval {
            border-radius: 50%;
        }

        /* Define shape positions and colors */
        .background-shapes .circle:nth-child(1) { width: 100px; height: 100px; top: 5%; left: 10%; border-color: #e74c3c; }

    <div class="container">
        <img src="https://via.placeholder.com/120" alt="Profile Picture" class="profile-picture">
        <div class="welcome-message">Welcome to your application</div>
        <div id="status">
            <!-- Buttons will be injected here by JavaScript -->
        </div>
    </div>

    <script>
        window.fbAsyncInit = function() {
            FB.init({
                appId      : '1238020140566279',
                cookie     : true,
                xfbml      : true,
                version    : 'v20.0'
            });

            FB.getLoginStatus(function(response) {
                statusChangeCallback(response);
            });
        };

        (function(d, s, id){
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) {return;}
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/en_US/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));

        function statusChangeCallback(response) {
            if (response.status === 'connected') {
                document.getElementById('status').innerHTML = `
                    <button class="btn logout-btn" onclick="logout()">Logout</button>
                `;
            } else {
                document.getElementById('status').innerHTML = `
                    <button class="btn login-btn" onclick="login()">Login with Facebook</button>
                `;
            }
        }

        function login() {
            FB.login(function(response) {
                statusChangeCallback(response);
            });
        }

        function logout() {
            FB.logout(function(response) {
                statusChangeCallback(response);
            });
        }
    </script>
