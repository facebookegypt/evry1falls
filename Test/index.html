esponse.name;document.getElementById('profile-pic').src=response.picture.data.url});document.getElementById('login-btn').style.display='none';document.getElementById('logout-btn').style.display='block'}},{scope:'public_profile,email'})}function logout(){FB.logout(function(response){document.getElementById('username').innerHTML='';document.getElementById('profile-pic').src='';document.getElementById('login-btn').style.display='block';document.getElementById('logout-btn').style.display='none'})}</script><button id="login-btn" onclick="login()">Login with Facebook</button><button id="logout-btn" onclick="logout()">Logout</button><div class="profile"><h2 id="username"></h2><img id="profile-pic" src="" alt="Profile Picture"></div></div></body></html>
