<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login with Facebook to access your profile and view personalized stats.">
    <meta name="google-site-verification" content="wLd5RpntOn13Q149-gVDIb6YdlCHw_R-PLr0f6BGJdw" />
    <title>Neumorphism Facebook Login</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #e0e0e0;
            color: #333;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .container {
            background-color: #e0e0e0;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 8px 8px 15px rgba(0, 0, 0, 0.1), -8px -8px 15px rgba(255, 255, 255, 0.7);
            text-align: left;
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1), -4px -4px 10px rgba(255, 255, 255, 0.7);
            cursor: pointer;
        }

        .container h1 {
            font-size: 1em;
            margin: 0;
        }

        .container p {
            font-size: 0.9em;
            margin: 0;
            color: #333;
        }

        .container button {
            background-color: #e0e0e0;
            border: none;
            padding: 8px 16px;
            font-size: 0.9em;
            border-radius: 20px;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1), -4px -4px 10px rgba(255, 255, 255, 0.7);
            cursor: pointer;
            margin: 0;
            transition: box-shadow 0.3s ease;
        }

        .container button:hover {
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1), -2px -2px 5px rgba(255, 255, 255, 0.7);
        }

        .stats {
            display: flex;
            align-items: center;
        }

        .stats p {
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img id="profile-pic" src="img/looking-good.gif" alt="Profile Picture" onclick="openProfile()">
        <div class="stats">
            <h1 id="user-name">Welcome!</h1>
            <p id="user-age"></p>
            <p id="user-friends"></p>
        </div>
        <button id="fb-logout-btn" style="display: none;">Logout</button>
    </div>

    <script>
        window.fbAsyncInit = function() {
            FB.init({
                appId      : '1238020140566279', // Your Facebook App ID
                cookie     : true,
                xfbml      : true,
                version    : 'v20.0'
            });

            FB.getLoginStatus(function(response) {
                statusChangeCallback(response);
            });
        };

        (function(d, s, id){
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) {return;}
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/en_US/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));

        function statusChangeCallback(response) {
            if (response.status === 'connected') {
                FB.api('/me', {fields: 'name,birthday,age_range,picture,friends'}, function(response) {
                    document.getElementById('user-name').textContent = 'Welcome, ' + response.name + '!';
                    document.getElementById('profile-pic').src = response.picture.data.url;

                    const age = calculateAge(response.birthday);
                    document.getElementById('user-age').textContent = 'You are ' + age.years + ' years, ' + age.months + ' months, ' + age.days + ' days old.';
                    document.getElementById('user-friends').textContent = 'You have ' + response.friends.summary.total_count + ' friend(s).';

                    // Show the logout button
                    document.getElementById('fb-logout-btn').style.display = 'inline';

                    // Store user data in Firestore
                    storeUserData(response.name, response.picture.data.url, age);
                });
            } else {
                document.getElementById('fb-logout-btn').style.display = 'none';
            }
        }

        function calculateAge(birthday) {
            const today = new Date();
            const birthDate = new Date(birthday);
            let years = today.getFullYear() - birthDate.getFullYear();
            let months = today.getMonth() - birthDate.getMonth();
            let days = today.getDate() - birthDate.getDate();

            if (days < 0) {
                months--;
                days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            return { years, months, days };
        }

        function openProfile() {
            FB.api('/me', {fields: 'link'}, function(response) {
                window.open(response.link, '_blank');
            });
        }

        function storeUserData(name, picture, age) {
            const db = firebase.firestore();
            db.collection('users').add({
                name: name,
                picture: picture,
                age: age
            });
        }

        document.getElementById('fb-logout-btn').onclick = function() {
            FB.logout(function(response) {
                document.getElementById('profile-pic').src = 'img/looking-good.gif';
                document.getElementById('user-name').textContent = 'Welcome!';
                document.getElementById('user-age').textContent = '';
                document.getElementById('user-friends').textContent = '';
                document.getElementById('fb-logout-btn').style.display = 'none';
            });
        };
    </script>

    <!-- Firebase setup -->

    </script>
</body>
</html>
