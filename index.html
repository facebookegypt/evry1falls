<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login with Facebook to access your profile and view personalized stats.">
    <meta name="google-adsense-account" content="ca-pub-6340254487227270">
    <title>Neumorphism Facebook Login</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
    <link rel="stylesheet" href="style.css"> <!-- Link to external CSS -->
</head>
<body>
    <div class="shapes" id="shapes"></div>
    <div class="container" id="container">
        <img id="profile-pic" src="img/looking-good.gif" alt="Profile Picture">
        <h1 id="user-name">Welcome!</h1>
        <!--<button id="fb-login-btn" type="submit">Login with Facebook</button>-->
        <button id="fb-login-btn" type="submit" onclick="checkLoginState()">Login with Facebook</button>
        <button id="fb-logout-btn" type="submit" style="display: none;">Logout</button>
    </div>
    
    <!-- استبيان المستخدم -->
    <div class="survey-box" id="survey-box" style="display: none;">
        <h2>Complete the survey:</h2>
        <form id="survey-form">
            <label for="question1">How satisfied are you with our service?</label>
            <select id="question1" required>
                <option value="Very satisfied">Very satisfied</option>
                <option value="Satisfied">Satisfied</option>
                <option value="Neutral">Neutral</option>
                <option value="Unsatisfied">Unsatisfied</option>
                <option value="Very unsatisfied">Very unsatisfied</option>
            </select>

            <label for="question2">How likely are you to recommend us to a friend?</label>
            <select id="question2" required>
                <option value="Very likely">Very likely</option>
                <option value="Likely">Likely</option>
                <option value="Neutral">Neutral</option>
                <option value="Unlikely">Unlikely</option>
                <option value="Very unlikely">Very unlikely</option>
            </select>

            <button type="submit">Submit</button>
        </form>
    </div>
    <!-- نتائج الاستبيان وخيارات المشاركة -->
    <div class="result-box" id="result-box" style="display: none;">
        <h3>Survey Result:</h3>
        <p id="survey-result"></p>
        <button onclick="shareAsText()">Share as Text</button>
        <button onclick="shareAsImage()">Share as Image</button>
        <img id="result-image" src="" alt="Result Image" style="display: none; width: 100%; margin-top: 10px;">
    </div>

    <!-- Firebase and App JS -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="app.js"></script> <!-- Linked app.js -->
</body>
</html>
