<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login with Facebook to access your profile and view personalized stats.">
    <title>Neumorphism Facebook Login</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #e0e0e0;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom right, #87CEFA, #B0E0E6);
        }

        .container {
            background-color: #e0e0e0;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 8px 8px 15px rgba(0, 0, 0, 0.1), -8px -8px 15px rgba(255, 255, 255, 0.7);
            text-align: center;
            max-width: 350px;
            width: 100%;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .container.logged-in {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            max-width: 100%;
            height: 60px;
        }

        .container img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1), -4px -4px 10px rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .container.logged-in img {
            width: 40px;
            height: 40px;
            margin-bottom: 0;
            margin-left: 10px;
        }

        .container h1 {
            font-size: 1.5em;
            margin: 10px 0;
            transition: all 0.3s ease;
        }

        .container.logged-in h1 {
            font-size: 1em;
            margin: 0;
            margin-left: 10px;
        }

        .container p {
            font-size: 1em;
            margin: 5px 0;
            color: #777;
        }

        .container button {
            background-color: #e0e0e0;
            border: none;
            padding: 12px 20px;
            font-size: 1em;
            border-radius: 20px;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1), -4px -4px 10px rgba(255, 255, 255, 0.7);
            cursor: pointer;
            margin: 10px;
            transition: box-shadow 0.3s ease;
        }

        .container.logged-in button {
            margin: 0;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .container button:hover {
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1), -2px -2px 5px rgba(255, 255, 255, 0.7);
        }

        .stats {
            margin-top: 20px;
        }

        .stats p {
            font-size: 0.9em;
            color: #333;
        }

        .shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            display: none;
        }

        .shapes div {
            position: absolute;
            border: 2px solid;
            box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.2), -3px -3px 5px rgba(255, 255, 255, 0.8);
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="shapes" id="shapes"></div>
    <div class="container" id="container">
        <img id="profile-pic" src="img/looking-good.gif" alt="Profile Picture">
        <h1 id="user-name">Welcome!</h1>
        <button id="fb-login-btn">Login with Facebook</button>
        <button id="fb-logout-btn" style="display: none;">Logout</button>

        <div class="stats" id="user-stats" style="display: none;">
            <p id="user-friends">Friends: 0</p>
        </div>
    </div>

    <!-- Firebase App (v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <!-- Firebase Configuration -->
    <script>
        // Your Firebase configuration
        var firebaseConfig = {
            apiKey: "AIzaSyBdDxwmuS9w0VnfYzLL2ptYBI4GYUWuZqQ",
            authDomain: "git-hub-test-34e5a.firebaseapp.com",
            databaseURL: "https://git-hub-test-34e5a-default-rtdb.firebaseio.com",
            projectId: "git-hub-test-34e5a",
            storageBucket: "git-hub-test-34e5a.appspot.com",
            messagingSenderId: "824616741271",
            appId: "1:824616741271:web:7d068b5de85ba781757cd2",
            measurementId: "G-TV39YCR646"
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        var firestore = firebase.firestore();
    </script>

    <!-- Facebook SDK -->
    <script>
        window.fbAsyncInit = function() {
            FB.init({
                appId      : '1238020140566279', // Your Facebook App ID
                cookie     : true,
                xfbml      : true,
                version    : 'v20.0'
            });

            FB.getLoginStatus(function(response) {
                statusChangeCallback(response);
            });
        };

        (function(d, s, id){
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) {return;}
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/en_US/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));

        function statusChangeCallback(response) {
            var container = document.getElementById('container');
            if (response.status === 'connected') {
                document.getElementById('fb-login-btn').style.display = 'none';
                document.getElementById('fb-logout-btn').style.display = 'inline';
                document.getElementById('shapes').style.display = 'block'; // Show shapes after login
                container.classList.add('logged-in'); // Apply new styles for logged in

                generateShapes(); // Call to generate shapes after login

                FB.api('/me', {fields: 'name,picture'}, function(response) {
                    document.getElementById('user-name').textContent = 'Welcome, ' + response.name + '!';
                    document.getElementById('profile-pic').src = response.picture.data.url;
                    document.getElementById('profile-pic').onclick = function() {
                        window.open('https://facebook.com/' + response.id, '_blank'); // Open profile in new window
                    };

                    // Store user data in Firestore
                    firestore.collection('users').doc(response.id).set({
                        name: response.name,
                        picture: response.picture.data.url
                    }).then(function() {
                        console.log('User data saved to Firestore');
                    }).catch(function(error) {
                        console.error('Error saving user data: ', error);
                    });
                });
            } else {
                document.getElementById('fb-login-btn').style.display = 'inline';
                document.getElementById('fb-logout-btn').style.display = 'none';
                document.getElementById('shapes').style.display = 'none'; // Hide shapes before login
                container.classList.remove('logged-in'); // Reset styles when logged out
            }
        }

        document.getElementById('fb-logout-btn').onclick = function() {
            FB.logout(function(response) {
                statusChangeCallback(response);
            });
        };
    </script>

    <!-- Shape Generation -->
    <script>
        function generateShapes() {
            const shapesContainer = document.getElementById('shapes');
            shapesContainer.innerHTML = ''; // Clear previous shapes
            const shapes = ['circle', 'rectangle', 'square'];
            const colors = ['#FF4500', '#00BFFF', '#8A2BE2', '#FF69B4'];

            for (let i = 0; i < 42; i++) {
                const shape = document.createElement('div');
                shape.style.width = Math.random() * 50 + 20 + 'px';
                shape.style.height = shape.style.width;
                shape.style.backgroundColor = 'transparent';
                shape.style.borderColor = colors[Math.floor(Math.random() * colors.length)];
                shape.style.borderStyle = 'solid';
                shape.style.borderWidth = '2px';

                const shapeType = shapes[Math.floor(Math.random() * shapes.length)];
                if (shapeType === 'circle') {
                    shape.style.borderRadius = '50%';
                } else if (shapeType === 'rectangle') {
                    shape.style.borderRadius = '0';
                } else if (shapeType === 'square') {
                    shape.style.borderRadius = '10%';
                }

                shape.style.top = Math.random() * 90 + '%';
                shape.style.left = Math.random() * 90 + '%';

                shapesContainer.appendChild(shape);
            }
        }
    </script>
</body>
</html>
