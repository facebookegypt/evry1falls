<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <meta http-equiv="x-content-type-options" content="nosniff">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="description" content="Login with Facebook to access your profile and view personalized stats.">
  <meta name="google-adsense-account" content="ca-pub-6340254487227270">
  <meta property="og:title" content="Your Page Title Here">
  <meta property="og:description" content="A brief description of your page content.">
  <meta property="og:image" content="https://facebookegypt.github.io/evry1falls/img/looking-good.gif">
  <meta property="og:url" content="https://facebookegypt.github.io/evry1falls/">
  <meta property="og:type" content="website">
  <meta property="fb:app_id" content="880835337346722">
  <title>Neumorphism Facebook Login</title>
  <link href="favicon.ico" rel="icon" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div class="shapes" id="shapes"></div>
  <div class="container" id="container">
    <img id="profile-pic" src="img/looking-good.gif" alt="Profile Picture">
    <h1 id="user-name">Welcome!</h1>
    <button id="fb-login-btn" type="submit">Login with Facebook</button>
    <button id="fb-logout-btn" type="submit" style="display: none;">Logout</button>
  </div>

  <div id="survey-container" style="display:none;">
    <h2>Survey</h2>
    <form id="survey-form">
      <label for="question1">What is your favorite color?</label>
      <select id="question1" name="question1" required>
        <option value="">--Please choose an option--</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="yellow">Yellow</option>
      </select>
      <br>
      <label for="question2">How often do you use Facebook?</label>
      <select id="question2" name="question2" required>
        <option value="">--Please choose an option--</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
        <option value="rarely">Rarely</option>
      </select>
      <br>
      <button type="submit">Submit Survey</button>
    </form>
    <div id="survey-results" style="display:none;">
      <h3>Your Survey Results</h3>
      <p id="result-text"></p>
      <button id="share-results">Share Results</button>
    </div>
  </div>

  <!-- Footer -->
<footer class="site-footer">
  <div class="footer-container">
    <!-- Column 1: Site Info -->
    <div class="footer-left">
      <h4>Ahmed Samir's</h4>
      <p>© 2024 Your Website | All Rights Reserved</p>
      <h4><a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms and Conditions</a></h4>
      <a href="#" class="delete-link" style="display: none;">Delete My Data</a>
      <p id="last-login" class="footer-last-login">Your last login was on ...</p>
    </div>

    <!-- Column 2: Blank -->
    <div class="footer-blank"></div>

    <!-- Column 3: Blank -->
    <div class="footer-blank"></div>

    <!-- Column 4: Social Icons -->
    <div class="footer-social">
      <h4>Follow Us</h4>
      <ul class="social-icons">
        <li><a href="https://facebook.com/evry1falls" target="_blank"><i class="fab fa-facebook"></i> Facebook</a></li>
        <li><a href="https://twitter.com/evry1falls" target="_blank"><i class="fab fa-twitter"></i> Twitter</a></li>
        <li><a href="https://instagram.com/evry1falls" target="_blank"><i class="fab fa-instagram"></i> Instagram</a></li>
        <li><a href="https://reddit.com/evry1falls" target="_blank"><i class="fab fa-reddit"></i> Reddit</a></li>
        <li><a href="https://linkedin.com/evry1falls" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a></li>
        <li><a href="https://youtube.com/evry1falls" target="_blank"><i class="fab fa-youtube"></i> YouTube</a></li>
      </ul>
    </div>
  </div>
</footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="app.js"></script>
</body>
</html>
