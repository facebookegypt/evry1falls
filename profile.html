<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="styles.css"> <!-- Reference to external CSS file -->
    <script src="profile.js"></script> <!-- Reference to external JS file -->
</head>
<body>
    <div class="profile-card">
        <img id="profile-pic" src="" alt="Profile Picture">
        <h1 id="user-name"></h1> <!-- User name will be placed here -->
        <p id="user-gender"></p> <!-- User gender will be placed here (Mr./Ms.) -->
        <p id="user-hometown"></p> <!-- 2-line info about hometown will go here -->
        <p id="user-likes"></p> <!-- Likes will be listed at the bottom of the card -->
    </div>
</body>
</html>
